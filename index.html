<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="description" content="Chupa — Distraction-free messaging. Fast, secure, private." />

    <!-- PWA Web App Manifest & Standalone Config -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chupa" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='128' fill='%23059669'/><path d='M256 128c-70.7 0-128 46.6-128 104 0 35.1 21.3 66 54.6 85.3L168 368l56.8-24.3c10.1 2.8 20.7 4.3 31.2 4.3 70.7 0 128-46.6 128-104S326.7 128 256 128z' fill='%23ffffff'/></svg>" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#F5F5F8" media="(prefers-color-scheme: light)" />

    <title>Chupa</title>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => console.warn('SW reg info:', err))
        })
      }
    </script>
  </body>
</html>
